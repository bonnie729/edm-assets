<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurveyCake 發佈問卷流程原型</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a1a;font-family:'Noto Sans TC',sans-serif}

/* ---------- Stage / background image ---------- */
#stage{position:fixed;inset:0;width:100vw;height:100vh}
#bgImg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;-webkit-user-select:none;user-select:none;pointer-events:none}

/* ---------- Hotspot ---------- */
#hotspot{position:fixed;cursor:pointer;background:transparent}

/* ---------- Loading button ---------- */
#loadingBtn{position:fixed;display:none;align-items:center;justify-content:center;background:#BDBDBD;pointer-events:none}
.spinner{width:20px;height:20px;border-radius:50%;border:4px solid rgba(255,255,255,0.3);border-top:4px solid #ffffff;animation:spin 0.8s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ---------- Overlay + Modal (ported from party-popper-final.html) ---------- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;padding:24px;opacity:0;transition:opacity 150ms ease-out;pointer-events:none;z-index:10}
.overlay.show{opacity:1;pointer-events:auto}
.modal{width:600px;max-width:100%;background:#fff;border-radius:12px;padding:24px;box-shadow:0px 6px 24px rgba(0,0,0,0.1),0px 4px 12px rgba(0,0,0,0.02);position:relative;overflow:hidden;display:none;opacity:0;transform:scale(0.9)}
.close-btn{position:absolute;top:24px;right:24px;width:24px;height:24px;border-radius:100px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:background 0.15s;z-index:2}
.close-btn:hover{background:#f5f5f5}
.close-btn img{width:14px;height:14px;display:block}
.headline{color:#009974;font-size:24px;font-weight:500;line-height:1.4;position:relative;z-index:1}
.subline{color:#333;font-size:24px;font-weight:500;line-height:1.4;position:relative;z-index:1}
.survey-card{margin-top:24px;border:1px solid #e3e3e3;border-radius:4px;padding:16px;position:relative;z-index:1}
.survey-title{color:#333;font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}
.survey-meta{display:flex;align-items:center;gap:6px}
.survey-date{color:#6b6b6b;font-size:12px}
.status-dot{width:16px;height:16px;border-radius:50%;background:#E6F7F1;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:visible}
.status-dot::after{content:'';width:10px;height:10px;border-radius:50%;background:#3dba90;position:absolute;animation:breathe-dot 2s ease-in-out infinite}
@keyframes breathe-dot{0%,100%{box-shadow:0 0 0 0px rgba(61,186,144,0.4)}50%{box-shadow:0 0 0 6px rgba(230,247,241,0.3)}}
.bottom-row{margin-top:24px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.share-group{display:flex;align-items:center;gap:8px}
.icon-btn{width:32px;height:32px;border-radius:4px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
.icon-btn img{width:32px;height:32px;display:block;border-radius:4px}
.divider{width:1px;height:24px;background:#e3e3e3;flex-shrink:0}
.copy-btn{background:#3dba90;color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:500;height:32px;padding:0 16px;border-radius:4px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;min-width:108px;justify-content:center;animation:breathe 2s ease-in-out infinite;transition:background 0.15s,box-shadow 0.15s}
.copy-btn:hover{background:#35a67e;box-shadow:0 0 0 8px rgba(61,186,144,0.15);animation-play-state:paused}
.copy-btn.copied{animation-play-state:paused;box-shadow:none}
.copy-btn .link-icon{width:14px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.copy-btn .link-icon img{width:14px;height:14px;display:block}
.copy-btn .check-icon{font-size:14px;line-height:1;color:#fff}
@keyframes breathe{
  0%,100%{box-shadow:0 0 0 0px rgba(61,186,144,0.4)}
  50%{box-shadow:0 0 0 6px rgba(61,186,144,0.1)}
}
.more-share-link{width:116px;height:32px;background:#fff;color:#3dba90;border:none;border-radius:4px;font-size:14px;font-weight:500;font-family:'Noto Sans TC',sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;transition:background 0.15s}
.more-share-link:hover{background:#E6F7F1;text-decoration:none;color:#3dba90}

<script>
/* ---------- Copy-link logic (verbatim from party-popper-final.html) ---------- */
var copyTimer=null;
function handleCopy(){
  var btn=document.getElementById('copyBtn');
  var txt=document.getElementById('copyText');
  var icon=document.getElementById('copyIcon');
  if(btn.classList.contains('copied'))return;
  if(copyTimer)clearTimeout(copyTimer);
  txt.textContent='已複製！';
  icon.innerHTML='<span class="check-icon" style="font-size:13px;color:#fff;font-weight:500">✓</span>';
  btn.classList.add('copied');
  copyTimer=setTimeout(function(){
    txt.textContent='複製連結';
    icon.innerHTML='<img src="data:image/svg+xml;base64,PHN2ZyBwcmVzZXJ2ZUFzcGVjdFJhdGlvPSJub25lIiB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBvdmVyZmxvdz0idmlzaWJsZSIgc3R5bGU9ImRpc3BsYXk6IGJsb2NrOyIgdmlld0JveD0iMCAwIDEyLjMyMzMgMTIuMzIzMyIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggaWQ9IlZlY3RvciIgZD0iTTUuMjIxNjcgNy4xMDE2N0M1LjQ5NSA3LjM2MTY3IDUuNDk1IDcuNzg4MzMgNS4yMjE2NyA4LjA0ODMzQzQuOTYxNjcgOC4zMDgzMyA0LjUzNSA4LjMwODMzIDQuMjc1IDguMDQ4MzNDMi45NzUgNi43NDgzMyAyLjk3NSA0LjYzNSA0LjI3NSAzLjMzNUw2LjYzNSAwLjk3NUM3LjkzNSAtMC4zMjUgMTAuMDQ4MyAtMC4zMjUgMTEuMzQ4MyAwLjk3NUMxMi42NDgzIDIuMjc1IDEyLjY0ODMgNC4zODgzMyAxMS4zNDgzIDUuNjg4MzNMMTAuMzU1IDYuNjgxNjdDMTAuMzYxNyA2LjEzNSAxMC4yNzUgNS41ODgzMyAxMC4wODgzIDUuMDY4MzNMMTAuNDAxNyA0Ljc0ODMzQzExLjE4ODMgMy45NjgzMyAxMS4xODgzIDIuNzAxNjcgMTAuNDAxNyAxLjkyMTY3QzkuNjIxNjcgMS4xMzUgOC4zNTUgMS4xMzUgNy41NzUgMS45MjE2N0w1LjIyMTY3IDQuMjc1QzQuNDM1IDUuMDU1IDQuNDM1IDYuMzIxNjcgNS4yMjE2NyA3LjEwMTY3Wk03LjEwMTY3IDQuMjc1QzcuMzYxNjcgNC4wMTUgNy43ODgzMyA0LjAxNSA4LjA0ODMzIDQuMjc1QzkuMzQ4MzMgNS41NzUgOS4zNDgzMyA3LjY4ODMzIDguMDQ4MzMgOC45ODgzM0w1LjY4ODMzIDExLjM0ODNDNC4zODgzMyAxMi42NDgzIDIuMjc1IDEyLjY0ODMgMC45NzUgMTEuMzQ4M0MtMC4zMjUgMTAuMDQ4MyAtMC4zMjUgNy45MzUgMC45NzUgNi42MzVMMS45NjgzMyA1LjY0MTY3QzEuOTYxNjcgNi4xODgzMyAyLjA0ODMzIDYuNzM1IDIuMjM1IDcuMjYxNjdMMS45MjE2NyA3LjU3NUMxLjEzNSA4LjM1NSAxLjEzNSA5LjYyMTY3IDEuOTIxNjcgMTAuNDAxN0MyLjcwMTY3IDExLjE4ODMgMy45NjgzMyAxMS4xODgzIDQuNzQ4MzMgMTAuNDAxN0w3LjEwMTY3IDguMDQ4MzNDNy44ODgzMyA3LjI2ODMzIDcuODg4MzMgNi4wMDE2NyA3LjEwMTY3IDUuMjIxNjdDNi44MjgzMyA0Ljk2MTY3IDYuODI4MzMgNC41MzUgNy4xMDE2NyA0LjI3NVoiIGZpbGw9InZhcigtLWZpbGwtMCwgd2hpdGUpIi8+Cjwvc3ZnPgo=" data-icon="link" alt="連結" style="width:14px;height:14px;display:block">';

    container: document.getElementById('lottie-party'),
    renderer: 'svg',

/* ---------- Responsive hotspot / loading-button positioning ---------- */
// Hotspot rect measured against the 3840x2160 source image
var BTN = { x: 3616, y: 128, w: 176, h: 64 };
var BTN_RADIUS_LOGICAL_IMG = 8; // 4px logical * 2x export = 8px on the 3840x2160 image

var bgImg = document.getElementById('bgImg');
var hotspot = document.getElementById('hotspot');
var loadingBtn = document.getElementById('loadingBtn');
var overlay = document.getElementById('overlayEl');
var modal = document.getElementById('modalEl');

function computeImageLayout(){
  var rect = bgImg.getBoundingClientRect();
  var naturalW = bgImg.naturalWidth || 3840;
  var naturalH = bgImg.naturalHeight || 2160;
  var containerAspect = rect.width / rect.height;
  var imageAspect = naturalW / naturalH;
  var renderW, renderH, offsetX, offsetY;
  if (imageAspect > containerAspect) {
    renderW = rect.width;
    renderH = renderW / imageAspect;
    offsetX = rect.left;
    offsetY = rect.top + (rect.height - renderH) / 2;
  } else {
    renderH = rect.height;
    renderW = renderH * imageAspect;
    offsetY = rect.top;
    offsetX = rect.left + (rect.width - renderW) / 2;
  }
  var scale = renderW / naturalW;
  return { offsetX: offsetX, offsetY: offsetY, scale: scale };
}

function positionElements(){
  var layout = computeImageLayout();
  var left = layout.offsetX + BTN.x * layout.scale;
  var top = layout.offsetY + BTN.y * layout.scale;
  var w = BTN.w * layout.scale;
  var h = BTN.h * layout.scale;

  [hotspot, loadingBtn].forEach(function(el){
    el.style.left = left + 'px';
    el.style.top = top + 'px';
    el.style.width = w + 'px';
    el.style.height = h + 'px';
  });

  loadingBtn.style.borderRadius = (BTN_RADIUS_LOGICAL_IMG * layout.scale) + 'px';

  var spinner = loadingBtn.querySelector('.spinner');
  if (spinner) {
    var spinnerSize = Math.max(12, 20 * layout.scale);
    spinner.style.width = spinnerSize + 'px';
    spinner.style.height = spinnerSize + 'px';
    spinner.style.borderWidth = Math.max(2, 4 * layout.scale) + 'px';
  }
}

window.addEventListener('resize', positionElements);
if (bgImg.complete && bgImg.naturalWidth) {
  positionElements();
} else {
  bgImg.addEventListener('load', positionElements);
}

/* ---------- Publish flow state machine ---------- */
var overlayHideTimer = null;
var modalHideTimer = null;

function startPublish(){
  if (overlayHideTimer) { clearTimeout(overlayHideTimer); overlayHideTimer = null; }
  if (modalHideTimer) { clearTimeout(modalHideTimer); modalHideTimer = null; }

  hotspot.style.pointerEvents = 'none';
  hotspot.style.display = 'none';
  loadingBtn.style.display = 'flex';

  overlay.style.display = 'flex';
  // force reflow so the opacity transition actually fires
  void overlay.offsetWidth;
  overlay.classList.add('show');

  setTimeout(showModal, 1000);
}

function showModal(){
  loadingBtn.style.display = 'none';

  if (modalHideTimer) { clearTimeout(modalHideTimer); modalHideTimer = null; }

  modal.style.transition = 'none';
  modal.style.opacity = '0';
  modal.style.transform = 'scale(0.9)';
  modal.style.display = 'block';
  void modal.offsetWidth; // reflow
  modal.style.transition = 'opacity 250ms ease-out, transform 250ms ease-out';
  modal.style.opacity = '1';
  modal.style.transform = 'scale(1)';
}

function resetAll(){
  // fade the overlay opacity out; keep it visible until the modal's own exit
  // animation (250ms) finishes so the modal doesn't get cut off mid-fade
  overlay.classList.remove('show');
  if (overlayHideTimer) clearTimeout(overlayHideTimer);
  overlayHideTimer = setTimeout(function(){
    overlay.style.display = 'none';
    overlayHideTimer = null;
  }, 250);

  // animate the modal back to scaled-down/faded state before hiding it
  modal.style.transition = 'opacity 250ms ease-out, transform 250ms ease-out';
  modal.style.opacity = '0';
  modal.style.transform = 'scale(0.9)';
  if (modalHideTimer) clearTimeout(modalHideTimer);
  modalHideTimer = setTimeout(function(){
    modal.style.display = 'none';
    modalHideTimer = null;
  }, 250);

  loadingBtn.style.display = 'none';
  hotspot.style.display = 'block';
  hotspot.style.pointerEvents = 'auto';
}

hotspot.addEventListener('click', startPublish);
</script>
