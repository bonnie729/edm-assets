<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#fafafa;min-height:100vh;display:flex;align-items:center;justify-content:center}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;padding:24px}
.modal{width:600px;max-width:100%;background:#fff;border-radius:12px;padding:24px;box-shadow:0px 6px 24px rgba(0,0,0,0.1),0px 4px 12px rgba(0,0,0,0.02);position:relative;overflow:hidden}
.close-btn{position:absolute;top:24px;right:24px;width:24px;height:24px;border-radius:100px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:background 0.15s;z-index:1}
.close-btn:hover{background:#f5f5f5}
.close-btn img{width:14px;height:14px;display:block}
.headline{color:#009974;font-size:24px;font-weight:500;line-height:1.4;position:relative;z-index:1}
.subline{color:#333;font-size:24px;font-weight:500;line-height:1.4;position:relative;z-index:1}
.survey-card{margin-top:24px;border:1px solid #e3e3e3;border-radius:4px;padding:16px;position:relative;z-index:1}
.survey-title{color:#333;font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}
.survey-meta{display:flex;align-items:center;gap:6px}
.survey-date{color:#6b6b6b;font-size:12px}
.status-dot{width:16px;height:16px;border-radius:50%;background:#E6F7F1;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:visible}
.status-dot::after{content:'';width:10px;height:10px;border-radius:50%;background:#3dba90;position:absolute;animation:breathe-dot 2s ease-in-out infinite}
@keyframes breathe-dot{0%,100%{box-shadow:0 0 0 0px rgba(61,186,144,0.4)}50%{box-shadow:0 0 0 6px rgba(230,247,241,0.3)}}
.bottom-row{margin-top:24px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.share-group{display:flex;align-items:center;gap:8px}
.icon-btn{width:32px;height:32px;border-radius:4px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
.icon-btn img{width:32px;height:32px;display:block;border-radius:4px}
.divider{width:1px;height:24px;background:#e3e3e3;flex-shrink:0}
.copy-btn{background:#3dba90;color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:500;height:32px;padding:0 16px;border-radius:4px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;min-width:108px;justify-content:center;animation:breathe 2s ease-in-out infinite;transition:background 0.15s,box-shadow 0.15s}
.copy-btn:hover{background:#35a67e;box-shadow:0 0 0 8px rgba(61,186,144,0.15);animation-play-state:paused}
.copy-btn.copied{animation-play-state:paused;box-shadow:none}
.copy-btn .link-icon{width:14px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.copy-btn .link-icon img{width:14px;height:14px;display:block}
.copy-btn .check-icon{font-size:14px;line-height:1;color:#fff}
@keyframes breathe{
  0%,100%{box-shadow:0 0 0 0px rgba(61,186,144,0.4)}
  50%{box-shadow:0 0 0 6px rgba(61,186,144,0.1)}
}
.more-share-link{width:116px;height:32px;background:#fff;color:#3dba90;border:none;border-radius:4px;font-size:14px;font-weight:500;font-family:'Noto Sans TC',sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;transition:background 0.15s}
.more-share-link:hover{background:#E6F7F1;text-decoration:none;color:#3dba90}
</style>
